project:
  name: "mental_health_rag_kg"
  version: "1.0.0"

paths:
  drive_base: "/content/drive/MyDrive/mental_health_rag_kg"
  data_dir: "data"
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  kg_dir: "kg/graphs"
  faiss_dir: "data/faiss_index"
  output_dir: "outputs/responses"

models:
  embedding: "sentence-transformers/all-MiniLM-L6-v2"
  llm: "Meta-Llama-3.3-70B-Instruct"
  fallback_llm: "Qwen/Qwen2-7B-Instruct"

api:
  sambanova_url: "https://api.sambanova.ai/v1/chat/completions"
  safety_url: "https://api.sambanova.ai/v1/chat/completions"
  max_tokens: 512
  temperature: 0.1
  top_p: 0.9

rag:
  top_k: 5
  chunk_size: 512
  chunk_overlap: 128
  min_chunk_length: 50
  retrieval_threshold: 0.3

kg:
  namespace: "http://example.org/mentalhealth#"
  base_ttl: "kg/graphs/mental_health_base.ttl"
  dynamic_ttl: "kg/graphs/dynamic_kg.ttl"
  max_symptoms: 15

safety:
  danger_keywords:
    - "suicide"
    - "kill myself"
    - "end my life"
    - "self-harm"
    - "hurt myself"
    - "overdose"
    - "hang myself"
    - "want to die"
    - "better off dead"
    - "no reason to live"
    - "cut myself"
    - "jump off"
  llm_safety_check: false

confidence:
  llm_weights:
    R: 0.40
    G: 0.35
    C: 0.25
  kg_weights:
    K: 0.50
    M: 0.30
    G: 0.20
  fusion:
    threshold_high: 0.75
    threshold_medium: 0.50
    threshold_low: 0.35
    hallucination_threshold: 0.30

embeddings:
  dimension: 384
  normalize: true
